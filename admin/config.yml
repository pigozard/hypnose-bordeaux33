  backend:
  name: github
  repo: pigozard/hypnose-bordeaux33
  branch: main
  squash_merges: true

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "accueil"
    label: "🏠 Page d'accueil"
    files:
      - label: "Contenu de la page"
        name: "hero"
        file: "_data/index.yml"
        fields:
          - label: "Accroche courte"
            name: "hero_badge"
            widget: "string"
            hint: "Le petit texte vert en haut. Ex: Hypnothérapeute à Bordeaux"

          - label: "Titre — première ligne"
            name: "hero_title"
            widget: "string"
            hint: "Ex: Retrouvez votre"

          - label: "Titre — mot en italique"
            name: "hero_title_em"
            widget: "string"
            hint: "Le mot mis en valeur en vert"

          - label: "Phrase de présentation"
            name: "hero_subtitle"
            widget: "text"
            hint: "Quelques lignes qui décrivent votre approche"

          - label: "Accréditation 1"
            name: "trust_1"
            widget: "string"
            hint: "Ex: Adhérent SNH"

          - label: "Accréditation 2"
            name: "trust_2"
            widget: "string"

          - label: "Accréditation 3"
            name: "trust_3"
            widget: "string"

          - label: "Rue du cabinet"
            name: "adresse"
            widget: "string"

          - label: "Ville"
            name: "adresse_ville"
            widget: "string"

          - label: "Ce que je traite"
            name: "indications"
            widget: "list"
            hint: "Les domaines d'accompagnement affichés sur la page"
            summary: "{{fields.titre}}"
            fields:
              - { label: "Icône (emoji)", name: "icon", widget: "string" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Description", name: "texte", widget: "text" }

          - label: "Les étapes d'une séance"
            name: "etapes"
            widget: "list"
            summary: "{{fields.titre}}"
            fields:
              - { label: "Numéro", name: "numero", widget: "string" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Description", name: "texte", widget: "text" }

          - label: "Témoignages"
            name: "temoignages"
            widget: "list"
            hint: "Les avis clients affichés sur la page"
            summary: "{{fields.auteur}} — {{fields.sujet}}"
            fields:
              - { label: "Témoignage", name: "texte", widget: "text" }
              - { label: "Prénom et initiale", name: "auteur", widget: "string", hint: "Ex: Sophie M." }
              - { label: "Motif de consultation", name: "sujet", widget: "string" }

          - label: "Titre du bouton final"
            name: "cta_titre"
            widget: "string"

          - label: "Sous-titre du bouton final"
            name: "cta_texte"
            widget: "string"
